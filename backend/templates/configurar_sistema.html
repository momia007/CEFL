{% extends 'parciales/base.html' %}

{% block titulo %}Configuración del sistema{% endblock %}

{% block contenido %}

<h2>Panel de Configuración</h2>
<div class="config-panel">
    <a class="config-card" href="{{ url_for('modulo_login.nuevo_usuario') }}">
        <h3>Usuarios</h3>
        <p>Crear, editar y administrar usuarios</p>
    </a>
    <a class="config-card" href="{{ url_for('inscripciones.configurar_inscripciones') }}">
        <h3>Inscripciones</h3>
        <p>Abrir o cerrar inscripciones</p>
    </a>
    <a class="config-card" href="{{ url_for('menu.admin_cursos') }}">
        <h3>Cursos</h3>
        <p>Modificar cursos y horarios</p>
    </a>
    <!-- Más opciones se agregan aquí -->
</div>
{% endblock %}
