{% extends 'parciales/base.html' %}

{% block titulo %}Crear Usuario{% endblock %}

{% block contenido %}
<h2>Nuevo Usuario</h2>

<form method="POST" action="{{ url_for('login.nuevo_usuario') }}">
    <label for="dni">DNI:</label>
    <input type="text" id="dni" name="dni" required>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" name="apellido" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email">

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required>

    <label for="nivel">Nivel:</label>
    <select id="nivel" name="nivel" required>
        <option value="Super">Super</option>
        <option value="Admin">Admin</option>
        <option value="Dep-AlumnosFP">Dep-AlumnosFP</option>
        <option value="Alumno">Alumno</option>
        <option value="Docente">Docente</option>
        <option value="Dep-Bachiller">Dep-Bachiller</option>
    </select>

    <button type="submit">Crear Usuario</button>
</form>
{% endblock %}
